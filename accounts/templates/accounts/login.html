{% extends 'base.html' %}
{% load static %}

{% block title %}Entrar — Enertech{% endblock %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-logo-wrap">
            <img src="{% static 'img/logo.jpeg' %}"
                 alt="Enertech Logo"
                 class="login-logo-img">
            <div class="login-logo-glow"></div>
        </div>

        <div class="login-brand">
            <h1 class="login-brand-name">Enertech</h1>
            <p class="login-brand-sub">Plataforma de eletropostos</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {% if 'success' in message.tags %}alert-success{% else %}alert-error{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" class="login-form">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" class="form-control"
                       placeholder="seu.usuario" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control"
                       placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn login-btn">Entrar</button>
        </form>

        <div class="login-footer-link">
            <small>
                Não tem conta?
                <a href="{% url 'register' %}">Criar conta</a>
            </small>
        </div>

    </div>
</div>

{% endblock %}
